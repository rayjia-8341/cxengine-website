  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#00D4AA;--primary-dark:#00B894;--secondary:#6C5CE7;--accent:#FF6B6B;
      --neon-blue:#00D4FF;--neon-purple:#B829DD;--dark:#080b16;--darker:#050810;
      --card-bg:#0d1220;--card-border:rgba(0,212,170,0.12);--light:#f0f4ff;
      --gray:#8892b0;--white:#ffffff;
      --gradient-1:linear-gradient(135deg,#00D4AA 0%,#00B894 100%);
      --gradient-hero:linear-gradient(135deg,#080b16 0%,#0d1835 50%,#0a1428 100%);
      --glow-primary:0 0 20px rgba(0,212,170,0.3),0 0 40px rgba(0,212,170,0.15);
    }
    html{scroll-behavior:smooth;font-size:16px}
    body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--dark);color:var(--light);line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    ::selection{background:var(--primary);color:var(--dark)}
    ::-webkit-scrollbar{width:7px}
    ::-webkit-scrollbar-track{background:var(--darker)}
    ::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}
    /* Loader */
    .page-loader{position:fixed;inset:0;background:var(--dark);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.6s ease,visibility 0.6s ease}
    .page-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .loader-logo{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:lp 1.5s ease-in-out infinite}
    .loader-bar{width:180px;height:3px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:1.5rem;overflow:hidden}
    .loader-progress{height:100%;background:var(--gradient-1);border-radius:3px;animation:loadP 1.8s ease forwards}
    @keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.98)}}
    @keyframes loadP{0%{width:0}30%{width:30%}60%{width:65%}100%{width:100%}}

    .nav-links{display:flex;gap:1.8rem;list-style:none}
    .nav-links a{color:rgba(255,255,255,.6);text-decoration:none;font-weight:500;font-size:.9rem;transition:all .3s ease;position:relative;padding:.2rem 0}
    .nav-links a:hover{color:var(--primary)}
    .nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--primary);transition:width .3s ease;box-shadow:0 0 8px var(--primary)}
    .nav-links a:hover::after{width:100%}
    .navbar-right{display:flex;align-items:center;gap:.8rem}
    .lang-switch{display:flex;align-items:center;gap:.3rem;background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.15);border-radius:50px;padding:.25rem .4rem;cursor:pointer;transition:all .3s ease}

    /* Hero */
    .hero{min-height:100vh;background:var(--gradient-hero);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:8rem 5% 5rem}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 45%,rgba(0,212,170,.08) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 20%,rgba(108,92,231,.1) 0%,transparent 55%),radial-gradient(ellipse 40% 40% at 50% 85%,rgba(0,212,255,.05) 0%,transparent 50%);pointer-events:none}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,170,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.025) 1px,transparent 1px);background-size:70px 70px;pointer-events:none;animation:gridM 20s linear infinite}

    .hero-content{text-align:center;position:relative;z-index:2;max-width:950px}

    @keyframes bp{0%,100%{opacity:1}50%{opacity:.3}}
    .hero h1{font-size:clamp(2.6rem,6.5vw,4.8rem);font-weight:900;color:var(--white);margin-bottom:1.5rem;line-height:1.15;animation:fIU .8s ease .2s both}
    .hero h1 .gt{background:linear-gradient(135deg,#00D4AA 0%,#00D4FF 50%,#6C5CE7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:gs 4s ease-in-out infinite}
    @keyframes gs{0%,100%{background-position:0% center}50%{background-position:100% center}}
    .hero-subtitle{font-size:clamp(1rem,2.2vw,1.3rem);color:rgba(255,255,255,.5);margin-bottom:2.8rem;animation:fIU .8s ease .4s both;line-height:1.9}
    .hero-buttons{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap;animation:fIU .8s ease .6s both}
    .btn-primary{background:var(--gradient-1);color:var(--dark);padding:.9rem 2.4rem;border-radius:50px;text-decoration:none;font-weight:700;font-size:1rem;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 25px rgba(0,212,170,.35);position:relative;overflow:hidden}
    .btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);transform:translateX(-100%);transition:transform .6s ease}
    .btn-primary:hover::before{transform:translateX(100%)}
    .btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(0,212,170,.5)}
    .btn-secondary{background:rgba(255,255,255,.04);color:var(--white);padding:.9rem 2.4rem;border-radius:50px;text-decoration:none;font-weight:600;font-size:1rem;border:1px solid rgba(255,255,255,.12);transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(10px)}
    .btn-secondary:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-3px);background:rgba(0,212,170,.04)}
    @keyframes fIU{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fID{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
    .hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem;margin-top:3.5rem;animation:fIU .8s ease .8s both}
    .hero-stat{text-align:center;padding:1.4rem 1rem;background:rgba(0,212,170,.03);border:1px solid rgba(0,212,170,.09);border-radius:16px;transition:all .3s ease;position:relative;overflow:hidden}
    .hero-stat:hover{border-color:rgba(0,212,170,.28);transform:translateY(-3px)}
    .hero-stat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,170,.07) 0%,transparent 60%);opacity:0;transition:opacity .3s ease}
    .hero-stat:hover::before{opacity:1}
    .stat-number{font-family:'Orbitron',sans-serif;font-size:2.3rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--neon-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block}
    .stat-label{color:rgba(255,255,255,.4);font-size:.82rem;margin-top:.3rem;font-weight:500}
    /* Sections */
    .section{padding:6rem 5%;position:relative;z-index:1}
    .section-tag{display:inline-flex;align-items:center;gap:.4rem;background:rgba(0,212,170,.07);color:var(--primary);padding:.35rem 1.1rem;border-radius:50px;font-size:.75rem;font-weight:700;margin-bottom:1rem;letter-spacing:1px;text-transform:uppercase;border:1px solid rgba(0,212,170,.15)}
    .section-header{text-align:center;margin-bottom:3.5rem}
    .section-header h2{font-size:clamp(1.9rem,4vw,3rem);font-weight:900;color:var(--white);margin-bottom:.8rem;letter-spacing:-.5px}
    .section-header p{font-size:1.05rem;color:rgba(255,255,255,.4);max-width:580px;margin:0 auto}
    /* Data cards */
    .data-section{background:linear-gradient(180deg,var(--darker) 0%,var(--dark) 100%);border-top:1px solid rgba(0,212,170,.06);border-bottom:1px solid rgba(0,212,170,.06)}
    .data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.3rem;max-width:1200px;margin:0 auto}
    .data-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:1.8rem 1.5rem;position:relative;overflow:hidden;transition:all .4s ease;opacity:0;transform:translateY(25px)}
    .data-card.visible{opacity:1;transform:translateY(0)}
    .data-card:hover{border-color:rgba(0,212,170,.28);transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.4)}
    .data-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .data-card:nth-child(1)::before{background:linear-gradient(90deg,#00D4AA,#00B894)}
    .data-card:nth-child(2)::before{background:linear-gradient(90deg,#6C5CE7,#a29bfe)}
    .data-card:nth-child(3)::before{background:linear-gradient(90deg,#FF6B6B,#ffa502)}
    .data-card:nth-child(4)::before{background:linear-gradient(90deg,#00D4FF,#0099cc)}
    .data-card:nth-child(5)::before{background:linear-gradient(90deg,#FFD700,#FFA500)}
    .data-card:nth-child(6)::before{background:linear-gradient(90deg,#E040FB,#B829DD)}
    .data-icon{font-size:2.2rem;margin-bottom:.8rem}
    .data-value{font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;color:var(--white);margin-bottom:.2rem}
    .data-unit{font-size:1.1rem;color:var(--primary);font-weight:700}
    .data-label{font-size:.85rem;color:rgba(255,255,255,.38);font-weight:500;margin-bottom:.8rem}
    .data-bar{height:3px;background:rgba(255,255,255,.05);border-radius:3px;margin-top:.8rem;overflow:hidden}
    .data-bar-fill{height:100%;border-radius:3px;width:0;transition:width 2s cubic-bezier(.4,0,.2,1)}
    .data-trend{display:inline-flex;align-items:center;gap:.3rem;color:#00D4AA;font-size:.78rem;font-weight:600;margin-top:.6rem}
    /* Services */
    .services{background:var(--dark)}
    .services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.3rem;max-width:1200px;margin:0 auto}
    .service-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:2.2rem 1.8rem;transition:all .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:default;opacity:0;transform:translateY(25px)}
    .service-card.visible{opacity:1;transform:translateY(0)}
    .service-card:hover{border-color:rgba(0,212,170,.22);box-shadow:0 25px 60px rgba(0,0,0,.5)}
    .service-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient-1);transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
    .service-card:hover::after{transform:scaleX(1)}
    .service-card:nth-child(2)::after{background:linear-gradient(90deg,#6C5CE7,#a29bfe)}
    .service-card:nth-child(3)::after{background:linear-gradient(90deg,#FF6B6B,#ffa502)}
    .service-card:nth-child(4)::after{background:linear-gradient(90deg,#00D4FF,#0099cc)}
    .service-icon{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin-bottom:1.3rem}
    .service-card:nth-child(1) .service-icon{background:rgba(0,212,170,.11)}
    .service-card:nth-child(2) .service-icon{background:rgba(108,92,231,.11)}
    .service-card:nth-child(3) .service-icon{background:rgba(255,107,107,.11)}
    .service-card:nth-child(4) .service-icon{background:rgba(0,212,255,.11)}
    .service-card h3{font-size:1.25rem;font-weight:800;color:var(--white);margin-bottom:.7rem}
    .service-card p{color:rgba(255,255,255,.42);line-height:1.75;font-size:.92rem}
    .service-tag{display:inline-block;margin-top:1rem;padding:.25rem .75rem;background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.14);border-radius:50px;font-size:.72rem;color:var(--primary);font-weight:600}
    /* Games */
    .games{background:linear-gradient(180deg,var(--dark) 0%,var(--darker) 50%,var(--dark) 100%)}
    .games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.8rem;max-width:1200px;margin:0 auto}
    .game-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(25px)}

    .game-card:hover{border-color:rgba(0,212,170,.22);transform:translateY(-7px);box-shadow:0 30px 70px rgba(0,0,0,.5)}

    .game-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(13,18,32,.8) 100%)}
    .game-info{padding:1.6rem}
    .game-badge{display:inline-block;padding:.18rem .75rem;background:rgba(0,212,170,.09);border:1px solid rgba(0,212,170,.18);border-radius:50px;font-size:.68rem;color:var(--primary);font-weight:600;margin-bottom:.7rem}
    .game-info h3{font-size:1.2rem;font-weight:800;color:var(--white);margin-bottom:.5rem}
    .game-info>p{color:rgba(255,255,255,.42);font-size:.88rem;line-height:1.7}
    .game-stats{display:flex;gap:1.5rem;margin-top:1.1rem;padding-top:1.1rem;border-top:1px solid rgba(255,255,255,.06)}
    .game-stat{text-align:center}
    .game-stat-value{font-family:'Orbitron',sans-serif;font-size:1.15rem;font-weight:700;color:var(--primary)}
    .game-stat-label{font-size:.72rem;color:rgba(255,255,255,.32);margin-top:.2rem}
    /* Partners */
    .partners{background:var(--dark);overflow:hidden}
    .partners-label{text-align:center;font-size:.78rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:2px;margin-bottom:2.5rem;font-weight:600}
    .partners-track{display:flex;gap:3rem;animation:scrollLogos 30s linear infinite;width:max-content}
    .partners-track:hover{animation-play-state:paused}
    .partner-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:center;gap:.8rem;white-space:nowrap;transition:all .3s ease;min-width:180px}

    .partner-item .p-icon{font-size:1.4rem}
    @keyframes scrollLogos{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    /* Features */
    .features{background:var(--darker);border-top:1px solid rgba(0,212,170,.06);border-bottom:1px solid rgba(0,212,170,.06)}
    .features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.3rem;max-width:1100px;margin:0 auto}
    .feature-item{text-align:center;padding:2rem 1.5rem;transition:all .3s ease;opacity:0;transform:translateY(25px)}

    .feature-item:hover{transform:translateY(-5px)}
